aid: pirsch
name: Pirsch
description: >-
  Pirsch is a privacy-first website analytics platform built and hosted in
  Germany. GDPR, CCPA, PECR, and Schrems II compliant, it tracks page views,
  sessions, custom events, conversion goals, funnels, and traffic sources
  without cookies or personal data storage. Developers access all data via a
  RESTful API with OAuth and access-key authentication, supported by official
  Go, JavaScript, and PHP SDKs.
